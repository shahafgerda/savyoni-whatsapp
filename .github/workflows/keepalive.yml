name: keep-alive

# Pings the bot's /health endpoint so Render's free tier does not spin the
# server down (it sleeps after ~15 min of no traffic). Runs every 5 minutes
# during school hours (03:30–13:00 UTC ≈ 06:30–16:00 Israel summer time), so
# the bot is warm and instant from 7:00 to 16:00. Outside this window it still
# replies, just with a one-time ~30s wake-up on the first message.

on:
  schedule:
    - cron: "*/5 3-12 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging at $(date -u)"
          curl -fsS --max-time 60 https://savyoni-whatsapp.onrender.com/health || echo "ping failed (server may be waking)"
