services:
  - type: web
    name: whatsapp-agent-savyoni
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_API_KEY
        sync: false
